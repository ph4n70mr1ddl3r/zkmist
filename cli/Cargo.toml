[package]
name = "zkmist-cli"
version = "2.0.0"
edition = "2021"

[[bin]]
name = "zkmist"
path = "src/main.rs"

[features]
default = ["v1", "v2"]
v1 = ["risc0-zkvm", "bincode"]
v2 = []

[dependencies]
# CLI framework
clap = { version = "4", features = ["derive"] }
# Ethereum interaction
alloy = { version = "1", features = ["providers", "signer-local", "contract", "transport-http"] }
# ZK proof generation — V1 (RISC Zero, optional)
risc0-zkvm = { version = "3.0.5", features = ["client", "prove"], optional = true }
bincode = { version = "1", optional = true }
# ZK proof generation — V2 (Halo2)
zkmist-circuits = { path = "../circuits" }
halo2_proofs = "0.3.0"
halo2curves = "0.6.0"
rand = "0.8"
# Merkle tree (shared library)
zkmist-merkle-tree = { path = "../merkle-tree" }
# Crypto primitives
ark-bn254 = "0.5"
ark-ff = "0.5"
light-poseidon = "0.4"
k256 = { version = "0.13", features = ["ecdsa", "arithmetic"] }
tiny-keccak = { version = "2.0", features = ["keccak"] }
# Hidden password input
rpassword = "7"
# Async runtime
tokio = { version = "1", features = ["full"] }
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Logging
tracing = "0.1"
tracing-subscriber = "0.3"
# Hex encoding/decoding
hex = "0.4"
# HTTP client for GitHub downloads
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
# SHA-256 for file integrity checks
sha2 = "0.10"
# Progress bar
indicatif = "0.17"
# Home directory
dirs = "5"

[dev-dependencies]
tempfile = "3"
