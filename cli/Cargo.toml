[package]
name = "zkmist-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "zkmist"
path = "src/main.rs"

[dependencies]
# CLI framework
clap = { version = "4", features = ["derive"] }
# Ethereum types
ethers = { version = "2", features = ["ethers-solc", "ws"] }
# ZK proof generation
risc0-zkvm = "5.0.0-rc.1"
# Merkle tree (shared library)
zkmist-merkle-tree = { path = "../merkle-tree" }
# Async runtime
tokio = { version = "1", features = ["full"] }
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Logging
tracing = "0.1"
tracing-subscriber = "0.3"
