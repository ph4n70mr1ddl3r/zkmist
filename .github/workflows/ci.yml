name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger for slow tests
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sunday at 03:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust workspace ─────────────────────────────────────────────────────
  rust-check:
    name: Rust – Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  rust-test:
    name: Rust – Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zkmist-merkle-tree
      - run: cargo test -p zkmist-circuits
      # CLI unit tests (excludes full Halo2 proving which needs large params)
      - run: cargo test -p zkmist-cli --bin zkmist

  # ── Nightly: run expensive ignored circuit tests ────────────────────────
  # These tests are too slow for PR CI (~15-30 min each) but MUST pass
  # before mainnet deployment. Run manually or via scheduled workflow.
  rust-test-slow:
    name: Rust – Slow Circuit Tests (ignored)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run ignored circuit tests
        run: |
          echo "Running full E2E and secp256k1 MockProver tests (these are slow)..."
          cargo test -p zkmist-circuits -- --ignored --nocapture
          echo "✅ All ignored circuit tests passed."

  rust-fmt:
    name: Rust – Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust – Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  # ── gen-production-verifier build-check ─────────────────────────────────
  # gen-production-verifier regenerates Halo2VerifyingKey.sol / Halo2Verifier.sol
  # from the full circuit VK at k=24 (the deployment blocker tracked in
  # SECURITY.md and flagged by the readiness checker). It lives in its OWN
  # Cargo workspace, separate from the root workspace, because it depends on
  # the PSE halo2 git fork while the root workspace uses crates.io halo2. This
  # job keeps the regen tool buildable so it can be invoked the moment we
  # regenerate the VK — bit-rot here would silently break deployment recovery.
  gen-verifier-build:
    name: gen-production-verifier – Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # vendor/halo2-solidity-verifier (path dep)
      - uses: dtolnay/rust-toolchain@stable
      # The path dep in gen-production-verifier/Cargo.toml resolves to
      # ../vendor/halo2-solidity-verifier, vendored as a git submodule pinned
      # to the commit that matches local development. The submodule's own
      # rust-toolchain.toml pin does NOT apply to a path dependency, so CI
      # `stable` builds it fine.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "gen-production-verifier"
      - name: Build gen-production-verifier (release)
        working-directory: gen-production-verifier
        run: cargo build --release

  # ── Pre-deployment readiness check ──────────────────────────────────────
  readiness:
    name: Pre-deployment Readiness
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run readiness checker
        run: cargo run -p zkmist-tools --bin readiness

  # ── Solidity contracts ─────────────────────────────────────────────────
  forge-test:
    name: Forge – Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run tests
        run: forge test -vvv

      - name: Gas snapshot
        run: forge snapshot
        continue-on-error: true  # Non-blocking: creates/updates snapshot

  # ── Forge fmt ───────────────────────────────────────────────────────────
  forge-fmt:
    name: Forge – Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Check formatting
        run: forge fmt --check

  # ── E2E test suite (manual trigger) ─────────────────────────────────────
  e2e-test:
    name: E2E Test Suite
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          submodules: recursive
      - name: Run E2E tests
        run: chmod +x scripts/e2e-test.sh && ./scripts/e2e-test.sh
        env:
          # Skip the bench step in CI (too slow)
          SKIP_BENCH: 1
