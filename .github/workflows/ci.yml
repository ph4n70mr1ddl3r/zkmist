name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger for slow tests
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sunday at 03:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust workspace ─────────────────────────────────────────────────────
  rust-check:
    name: Rust – Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      # Regression guard: the `monitor` binary lives behind the opt-in
      # `monitoring` feature (not in `default = []`), so `cargo check
      # --workspace` never compiles it. It previously bit-rotted across the
      # alloy 1.x upgrade (`RootProvider` gained a `Network` type parameter;
      # single-return `.call()` results are bare values, not `_0` structs) —
      # the documented on-chain `monitor` tool silently stopped building. Keep
      # this check so a future alloy bump can't break it unnoticed again.
      - run: cargo check -p zkmist-tools --features monitoring

  rust-test:
    name: Rust – Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zkmist-merkle-tree
      - run: cargo test -p zkmist-circuits
      # CLI unit tests (excludes full Halo2 proving which needs large params)
      - run: cargo test -p zkmist-cli --bin zkmist

  # ── Nightly: run expensive ignored circuit tests ────────────────────────
  # These tests are too slow for PR CI (~15-30 min each) but MUST pass
  # before mainnet deployment. Run manually or via scheduled workflow.
  rust-test-slow:
    name: Rust – Slow Circuit Tests (ignored)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run ignored circuit tests
        run: |
          echo "Running full E2E and secp256k1 MockProver tests (these are slow)..."
          cargo test -p zkmist-circuits -- --ignored --nocapture
          echo "✅ All ignored circuit tests passed."

  rust-fmt:
    name: Rust – Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust – Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings
      # Same regression guard as `rust-check`: lint the opt-in `monitoring`
      # feature too, so the `monitor` binary's alloy usage stays warning-clean
      # (it is excluded from `cargo clippy --workspace`).
      - run: cargo clippy -p zkmist-tools --features monitoring -- -D warnings

  # ── Pre-deployment readiness checks ───────────────────────────────────
  #
  # Two modes of the same tool (tools/src/readiness.rs):
  #   * readiness-pr  — runs on every PR/push with `--skip-slow`. The tool's
  #     default mode treats the KNOWN deploy blockers (VK regen, SRS pinning,
  #     placeholder AIRDROP_CONTRACT) as ADVISORY, so this gate is green
  #     unless a check that should be green genuinely *regresses*.
  #   * readiness-deploy — runs only on schedule / manual dispatch with
  #     `--strict`. Under `--strict` every known blocker also fails the run,
  #     so this is the gate you must clear immediately before mainnet.
  readiness-pr:
    name: Readiness (PR gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run readiness checker (PR mode — advisory on known blockers)
        run: cargo run -p zkmist-tools --bin readiness -- --skip-slow

  readiness-deploy:
    name: Readiness (deploy gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run readiness checker (strict — blocks deploy on any failure)
        run: cargo run -p zkmist-tools --bin readiness -- --strict

  # ── Solidity contracts ─────────────────────────────────────────────────
  forge-test:
    name: Forge – Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run tests
        run: forge test -vvv

      - name: Gas snapshot
        run: forge snapshot
        continue-on-error: true  # Non-blocking: creates/updates snapshot

  # ── Forge fmt ───────────────────────────────────────────────────────────
  forge-fmt:
    name: Forge – Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Check formatting
        run: forge fmt --check

  # ── E2E test suite (manual trigger) ─────────────────────────────────────
  e2e-test:
    name: E2E Test Suite
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          submodules: recursive
      - name: Run E2E tests
        run: chmod +x scripts/e2e-test.sh && ./scripts/e2e-test.sh
        env:
          # Skip the bench step in CI (too slow)
          SKIP_BENCH: 1
