name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger for slow tests
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sunday at 03:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust workspace ─────────────────────────────────────────────────────
  rust-check:
    name: Rust – Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  rust-test:
    name: Rust – Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zkmist-merkle-tree
      - run: cargo test -p zkmist-circuits
      # CLI unit tests (excludes full Halo2 proving which needs large params)
      - run: cargo test -p zkmist-cli --bin zkmist

  # ── Nightly: run expensive ignored circuit tests ────────────────────────
  # These tests are too slow for PR CI (~15-30 min each) but MUST pass
  # before mainnet deployment. Run manually or via scheduled workflow.
  rust-test-slow:
    name: Rust – Slow Circuit Tests (ignored)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run ignored circuit tests
        run: |
          echo "Running full E2E and secp256k1 MockProver tests (these are slow)..."
          cargo test -p zkmist-circuits -- --ignored --nocapture || true
          echo "NOTE: These tests require k=22 (~4M rows) and may take 15-30 minutes each."
          echo "They MUST pass before mainnet deployment."

  rust-fmt:
    name: Rust – Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust – Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  # ── Solidity contracts ─────────────────────────────────────────────────
  forge-test:
    name: Forge – Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run tests
        run: forge test -vvv

      - name: Gas snapshot
        run: forge snapshot
        continue-on-error: true  # Non-blocking: creates/updates snapshot

  forge-fmt:
    name: Forge – Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Check formatting
        run: forge fmt --check
