[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "cancun"
via_ir = true
# Allow tests to read repo files (used by the real-KZG round-trip test to load
# the proof fixture generated by `zkmist gen-roundtrip-fixture`). Read-only.
fs_permissions = [{ access = "read", path = "./" }]

# Remappings for dependency resolution
remappings = [
    "openzeppelin/=lib/openzeppelin-contracts/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Auto-generated verifier has long inline assembly lines
# that forge fmt cannot reformat. Exclude it.
[fmt]
ignore = ["src/Halo2Verifier.axiom.sol"]

# Basescan (Etherscan-family) source verification.
# Basescan is an Etherscan explorer, and an Etherscan API key is multi-chain —
# a single key from etherscan.io verifies on Basescan too.
#
# IMPORTANT: use the Etherscan V2 unified endpoint (api.etherscan.io/v2/api),
# NOT the deprecated V1 chain-specific endpoints (api.basescan.org/api), which
# now return a deprecation page instead of JSON and break `forge verify-contract`
# ("Failed to deserialize content: expected value at line 1 column 1"). V2
# requires chainid as a query param; bake it into the URL per chain. Foundry
# appends its own query with `&`, so the existing `?chainid=...` is preserved.
# Foundry interpolates ${VAR} from the environment — export ETHERSCAN_API_KEY
# before `forge verify-contract ... --chain base` (or run a deploy script).
[etherscan]
base = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=8453" }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=84532" }
