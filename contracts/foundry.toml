[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "cancun"
via_ir = true

# Remappings for dependency resolution
remappings = [
    "openzeppelin/=lib/openzeppelin-contracts/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Auto-generated verifier has long inline assembly lines
# that forge fmt cannot reformat. Exclude it.
[fmt]
ignore = ["src/Halo2Verifier.sol", "src/Halo2VerifyingKey.sol"]
