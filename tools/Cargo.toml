[package]
name = "zkmist-tools"
version = "2.0.0"
edition = "2021"

[[bin]]
name = "compute-root"
path = "src/compute_root.rs"

[[bin]]
name = "gen-verifier"
path = "src/gen_verifier.rs"

[dependencies]
zkmist-merkle-tree = { path = "../merkle-tree" }
zkmist-circuits = { path = "../circuits" }
ark-bn254 = "0.5"
ark-ff = "0.5"
light-poseidon = "0.4"
hex = "0.4"
sha2 = "0.10"
halo2_proofs = "0.3.0"
halo2curves = "0.6.0"
ff = "0.13"
snark-verifier = { version = "0.2", optional = true }

[features]
default = []
v2 = ["snark-verifier"]
