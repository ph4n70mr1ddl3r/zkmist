[package]
name = "zkmist-tools"
version = "0.2.0"
edition = "2021"

[[bin]]
name = "compute-root"
path = "src/compute_root.rs"

[[bin]]
name = "compute-image-id"
path = "src/compute_image_id.rs"

[[bin]]
name = "gen-verifier"
path = "src/gen_verifier.rs"

[dependencies]
zkmist-merkle-tree = { path = "../merkle-tree" }
zkmist-circuits = { path = "../circuits" }
ark-bn254 = "0.5"
ark-ff = "0.5"
light-poseidon = "0.4"
hex = "0.4"
halo2_proofs = "0.3.0"
halo2curves = "0.6.0"
risc0-zkvm = { version = "3.0.5", default-features = false, optional = true }

ff = "0.13"

[features]
default = ["v1"]
v1 = ["risc0-zkvm"]
